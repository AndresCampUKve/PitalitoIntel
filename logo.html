<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo TikTok - Pitalito Intel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    /* Fondo idéntico al Quantix Dark */
    background: #050608;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }
  
  /* Contenedor cuadrado perfecto para avatar de TikTok (1080x1080) */
  .avatar-container {
    width: 600px;
    height: 600px;
    background: radial-gradient(circle at center, #0b0e14 0%, #050608 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    border-radius: 50%; /* Para que visualices cómo se cortará en TikTok */
    border: 2px dashed rgba(255,255,255,0.1);
  }

  /* El Glow de fondo */
  .glow-bg {
    position: absolute;
    width: 400px;
    height: 400px;
    background: rgba(0, 208, 132, 0.15);
    filter: blur(80px);
    border-radius: 50%;
    z-index: 0;
  }

  /* El mega Pill de Bonanza */
  .bonanza-pill {
    background: rgba(0, 208, 132, 0.05); /* Fondo ligeramente verde */
    border: 3px solid #00d084;
    padding: 30px 60px;
    border-radius: 100px; /* Bordes redondeados perfectos */
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 
      0 0 40px rgba(0, 208, 132, 0.3), /* Glow exterior */
      inset 0 0 20px rgba(0, 208, 132, 0.1); /* Glow interior */
    z-index: 1;
    position: relative;
  }

  /* El icono del sol/asterisco */
  .icon {
    color: #00d084;
    font-size: 65px;
    line-height: 1;
    /* Glow en el texto */
    text-shadow: 0 0 20px rgba(0, 208, 132, 0.8);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* El texto de Bonanza */
  .text {
    color: #00d084;
    font-size: 60px;
    font-weight: 800;
    font-family: 'Outfit', sans-serif;
    letter-spacing: -1px;
    text-shadow: 0 0 20px rgba(0, 208, 132, 0.8);
  }
  
  .instruction {
    position: absolute;
    bottom: -60px;
    color: #8b92a5;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    text-align: center;
  }
</style>
</head>
<body>

  <!-- Puedes tomarle un "Recorte de Pantalla" (Windows + Shift + S) directamente al círculo y subirlo a TikTok -->
  <div class="avatar-container" id="capture-zone">
    <div class="glow-bg"></div>
    <div class="bonanza-pill">
      <div class="icon">✹</div>
      <div class="text">Bonanza</div>
    </div>
    
    <div class="instruction">
      Recorta este círculo (Windows + Shift + S)<br>
      es exactamente del tamaño para TikTok.
    </div>
  </div>

</body>
</html>
